<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voter ID Input Form</title>

    <link rel="stylesheet" href="source/bundle.css">

    <style>
    </style>
</head>

<body>

    <div class="container">

        <div class="img-upload">
            <label for="photo">Upload Voter Photo</label>
            <input type="file" id="photo" name="photo" accept="image/*">
        </div>

        <div class="form-grid">

            <div class="full-width">
                <label for="epicNo">Epic No.</label>
                <input type="text" id="epicNo" name="epicNo">
            </div>

            <div>
                <label for="nameMain">Name</label>
                <input type="text" id="nameMain" name="nameMain">
            </div>

            <div>
                <label for="nameLocal">Name (Local)</label>
                <input type="text" id="nameLocal" name="nameLocal">
            </div>

            <div>
                <label for="age">Age</label>
                <input type="number" id="age" name="age">
            </div>

            <div>
                <label for="gender">Gender</label>
                <select id="gender" name="gender">
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <div>
                <label for="houseNo">House No.</label>
                <input type="text" id="houseNo" name="houseNo">
            </div>

            <div>
                <label for="fatherHusband">Father/Husband</label>
                <select id="fatherHusband" name="fatherHusband">
                    <option value="Father">Father</option>
                    <option value="Husband">Husband</option>
                </select>
            </div>

            <div>
                <label for="fhName">F/H Name</label>
                <input type="text" id="fhName" name="fhName">
            </div>

            <div>
                <label for="fhNameLocal">F/H Name (Local)</label>
                <input type="text" id="fhNameLocal" name="fhNameLocal">
            </div>

            <div>
                <label for="tahshil">Tahshil</label>
                <input type="text" id="tahshil" name="tahshil">
            </div>

            <div>
                <label for="district">District</label>
                <input type="text" id="district" name="district">
            </div>

            <div class="full-width">
                <label for="assemblyConst">
                    Assembly Const. No. & Name
                </label>
                <input type="text" id="assemblyConst" name="assemblyConst">
            </div>

            <div class="full-width">
                <label for="assemblyConstLocal">
                    Assembly Const. No. & Name (Local)
                </label>
                <input type="text" id="assemblyConstLocal" name="assemblyConstLocal">
            </div>

            <div>
                <label for="partNumber">Part Number</label>
                <input type="text" id="partNumber" name="partNumber">
            </div>

            <div>
                <label for="partName">Part Name</label>
                <input type="text" id="partName" name="partName">
            </div>

            <div class="full-width">
                <label for="partNameLocal">
                    Part Name (Local)
                </label>
                <input type="text" id="partNameLocal" name="partNameLocal">
            </div>

            <div class="full-width">
                <label for="language">Select Language</label>
                <select id="language" name="language">
                    <option value="">SELECT</option>
                    <option value="Hindi">Hindi</option>
                    <option value="Punjabi">Punjabi</option>
                    <option value="Gujarati">Gujarati</option>
                    <option value="Marathi">Marathi</option>
                    <option value="Tamil">Tamil</option>
                    <option value="Kannada">Kannada</option>
                    <option value="Bengali">Bengali</option>
                    <option value="Telugu">Telugu</option>
                    <option value="Sindhi">Sindhi</option>
                    <option value="Oriya">Oriya</option>
                </select>
            </div>

            <div class="full-width">
                <label for="address">Address</label>
                <input type="text" id="address" name="address">
            </div>

            <div class="full-width">
                <label for="addressLocal">
                    Address (Local Language)
                </label>
                <input type="text" id="addressLocal" name="addressLocal">
            </div>

        </div>

        <div class="actions">
            <button type="button" id="generateBtn" class="btn-gen">
                Generate
            </button>

            <button type="button" id="clearBtn" class="btn-clear">
                Clear
            </button>
        </div>

    </div>

    <script src="source/bundle.js"></script>
</body>
</html>
